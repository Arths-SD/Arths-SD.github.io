<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite Premium - José & Maria</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto&display=swap" rel="stylesheet">
<style>
:root {
    --tema-cor: #5e7c3c;
    --bg-cor: #fefaf6;
}
* {margin:0; padding:0; box-sizing:border-box;}
body {font-family:'Roboto', sans-serif; background: var(--bg-cor); color:#333; line-height:1.6;}
h1,h2,h3,h4,h5 {font-family:'Playfair Display', serif; color: var(--tema-cor);}

/* Hero / Banner */
.hero {
    position: relative;
    height: 500px;
    background: url('banner.jpg') center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}
.hero::after {
    content:"";
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.35);
}
.hero h1 {
    position: relative;
    font-size:3em;
    color:#fff;
    padding:20px 50px;
    border-radius:15px;
}

/* Música */
.music {
    text-align:center;
    margin:15px 0;
    font-size:1.2em;
    color:#555;
}
.music button {
    background: var(--tema-cor);
    color:#fff;
    border:none;
    padding:10px 20px;
    font-size:1em;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
}
.music button:hover {background:#a8795b;}

/* Contagem regressiva */
.countdown {
    text-align:center;
    font-size:1.6em;
    margin:30px 10px;
    font-weight:bold;
    letter-spacing:1px;
}

/* Detalhes */
.details {
    max-width:750px;
    margin:30px auto;
    text-align:center;
    padding:0 10px;
}
.details h3 {margin-bottom:10px; font-size:1.8em;}
.details p {font-size:1.25em; margin-bottom:25px; color:#666;}

/* Galeria */
.gallery {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px 0;
}
.gallery img {
    width:230px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
    transition:0.3s;
}
.gallery img:hover {transform:scale(1.05);}

/* Vídeo */
.video {
    max-width:750px;
    margin:30px auto;
    text-align:center;
}
.video video {
    width:100%;
    border-radius:15px;
    box-shadow:0 4px 20px rgba(0,0,0,0.25);
}

/* RSVP */
.rsvp {
    text-align:center;
    margin:50px 10px;
}
.rsvp button {
    background: var(--tema-cor);
    color:#fff;
    border:none;
    padding:18px 40px;
    font-size:1.3em;
    border-radius:15px;
    cursor:pointer;
    transition:0.3s;
}
.rsvp button:hover {background:#a8795b;}

/* Footer */
footer {
    text-align:center;
    font-size:0.9em;
    color:#999;
    padding:25px 10px;
}
</style>
</head>
<body>

<section class="hero">
    <h1 id="nome-noivos">José & Maria</h1>
</section>

<section class="music">
    Música do casal: <span id="musica">Bridgerton Theme</span><br>
    <audio id="audio" src="bridgerton.mp3" loop></audio>
    <button id="playButton">▶️ Tocar / Pausar</button>
</section>

<section class="countdown">
    <div id="timer">Carregando contagem...</div>
</section>

<section class="details">
    <h3>Cerimônia</h3>
    <p id="data-evento">Domingo, 22 de Março – 16:00h</p>
    <h3>Local</h3>
    <p id="local-evento">Espaço Jardim Encantado, Rua das Flores, 123 – Cidade</p>
</section>

<section class="gallery">
    <img src="foto1.jpg" alt="Galeria 1">
    <img src="foto2.jpg" alt="Galeria 2">
    <img src="foto3.jpg" alt="Galeria 3">
    <img src="foto4.jpg" alt="Galeria 4">
</section>

<section class="video">
    <video controls>
        <source src="video.mp4" type="video/mp4">
        Seu navegador não suporta vídeo.
    </video>
</section>

<section class="rsvp">
    <button onclick="confirmar()">Confirmar Presença</button>
</section>

<footer>
    Desenvolvido com ❤️ por ExcluEvent
</footer>

<script>
// Configurações personalizáveis
const nomeNoivos = "kevin & jailyn";
const musicaNome = "Bridgerton Theme";
const dataEvento = "Domingo, 25 de maio – 16:00h";
const corTema = "#5e7c3c";

// Aplicar personalizações
document.getElementById("nome-noivos").textContent = nomeNoivos;
document.getElementById("musica").textContent = musicaNome;
document.getElementById("data-evento").textContent = dataEvento;
document.documentElement.style.setProperty('--tema-cor', corTema);

// Contagem regressiva
const countdownDate = new Date("Mar 22, 2026 16:00:00").getTime();
const timer = setInterval(function(){
    const now = new Date().getTime();
    const distance = countdownDate - now;

    const days = Math.floor(distance / (1000*60*60*24));
    const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((distance % (1000*60)) / 1000);

    document.getElementById("timer").innerHTML = 
        `Faltam ${days} dias ${hours}h ${minutes}m ${seconds}s`;

    if(distance < 0){
        clearInterval(timer);
        document.getElementById("timer").innerHTML = "O casamento já começou!";
    }
}, 1000);

// RSVP moderno
function confirmar(){
    const nome = prompt("Digite seu nome:");
    const email = prompt("Digite seu e-mail:");
    if(nome && email){
        alert(`Obrigado, ${nome}! Sua presença foi confirmada!`);
    } else {
        alert("Confirmação cancelada.");
    }
}

// Botão Play/Pause
const audio = document.getElementById("audio");
const playButton = document.getElementById("playButton");
playButton.addEventListener("click", () => {
    if(audio.paused){
        audio.play();
        playButton.textContent = "⏸️ Pausar";
    } else {
        audio.pause();
        playButton.textContent = "▶️ Tocar";
    }
});
</script>

</body>
</html>
