<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite de Casamento</title>

<style>
body{
  margin:0;
  font-family: 'Georgia', serif;
  background:#f3efe8;
  text-align:center;
  color:#5c6b60;
}

h1{
  margin-top:40px;
  font-size:36px;
}

.section{
  padding:30px 20px;
}

.carousel{
  position:relative;
  max-width:350px;
  margin:20px auto;
}

.carousel img{
  width:100%;
  border-radius:20px;
  display:none;
}

.carousel img.active{
  display:block;
}

button{
  margin-top:15px;
  padding:8px 15px;
  border:none;
  border-radius:10px;
  background:#5c6b60;
  color:white;
}
</style>
</head>

<body>

<h1>Ana & Marcos</h1>
<p>Retratos do Nosso Amor</p>

<div class="section">

<div class="carousel">
  <img src="https://picsum.photos/400/600?1" class="active">
  <img src="https://picsum.photos/400/600?2">
  <img src="https://picsum.photos/400/600?3">
</div>

<button onclick="toggleMusic()">Pausar Música</button>

<audio id="music" autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

</div>

<div class="section">
<h2>15 de Novembro de 2026</h2>
<p>Às 16h</p>
<p>Espaço Jardim Encantado</p>
</div>

<script>
let index = 0;
const slides = document.querySelectorAll(".carousel img");

setInterval(() => {
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}, 3000);

function toggleMusic(){
  const music = document.getElementById("music");
  if(music.paused){
    music.play();
  } else {
    music.pause();
  }
}
</script>

</body>
</html>
