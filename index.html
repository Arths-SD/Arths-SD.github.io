<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosso Convite</title>
<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: #fef9f4;
  text-align: center;
  color: #5f7d6b;
}
h1 {
  margin-top: 40px;
  font-size: 36px;
}
h2 {
  margin-top: 10px;
  font-size: 24px;
  font-weight: normal;
}
.carousel-container {
  position: relative;
  width: 90%;
  max-width: 400px;
  margin: 20px auto;
}
.carousel-container img {
  width: 100%;
  border-radius: 15px;
  display: none;
}
.carousel-container img.active {
  display: block;
}
.carousel-dots {
  text-align: center;
  margin-top: 10px;
}
.carousel-dots span {
  display: inline-block;
  width: 12px;
  height: 12px;
  margin: 0 5px;
  background-color: #ddd;
  border-radius: 50%;
  cursor: pointer;
}
.carousel-dots span.active {
  background-color: #5f7d6b;
}
button {
  margin: 10px;
  padding: 10px 20px;
  border: none;
  background: #5f7d6b;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}
audio {
  margin-top: 20px;
}
</style>
</head>
<body>

<h1>Convite de Casamento</h1>
<h2>Ana & Marcos</h2>

<div class="carousel-container">
  <img src="https://picsum.photos/400/600?1" class="active" alt="Foto 1">
  <img src="https://picsum.photos/400/600?2" alt="Foto 2">
  <img src="https://picsum.photos/400/600?3" alt="Foto 3">
</div>

<div class="carousel-dots">
  <span class="dot active" onclick="goToSlide(0)"></span>
  <span class="dot" onclick="goToSlide(1)"></span>
  <span class="dot" onclick="goToSlide(2)"></span>
</div>

<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  Seu navegador não suporta áudio.
</audio>

<script>
let index = 0;
const slides = document.querySelectorAll('.carousel-container img');
const dots = document.querySelectorAll('.dot');

function showSlide(i) {
  slides.forEach((s, idx) => {
    s.classList.toggle('active', idx === i);
    dots[idx].classList.toggle('active', idx === i);
  });
  index = i;
}

function nextSlide() {
  showSlide((index + 1) % slides.length);
}

function prevSlide() {
  showSlide((index - 1 + slides.length) % slides.length);
}

function goToSlide(i) {
  showSlide(i);
}

// Troca automática a cada 4 segundos
setInterval(nextSlide, 4000);
</script>

</body>
</html>
